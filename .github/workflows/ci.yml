# .github/workflows/ci.yml
name: Datathon CI

on:
  workflow_dispatch:
  push:
    paths: ['src/**', 'tests/**', 'evaluation/**']
  pull_request:
    paths: ['src/**', 'tests/**', 'evaluation/**']
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: pip install poetry


      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Lint (ruff)
        run: poetry run ruff check src/ tests/ evaluation/

      - name: Type check (mypy)
        run: poetry run mypy src/ --ignore-missing-imports --explicit-package-bases

      - name: Security scan (bandit)
        run: poetry run bandit -r src/ -c pyproject.toml

      - name: Unit tests (pytest)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          poetry run pytest tests/ -x \
            --cov=src \
            --cov-report=xml \
            --cov-fail-under=40 \
            --junitxml=test-results.xml
            
      - name: Run RAGAS evaluation
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: poetry run python -m evaluation.ragas_eval

      - name: Run LLM Judge
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: poetry run python -m evaluation.llm_judge

      - name: Check Gates anteriores
        run: poetry run python -m evaluation.check_gates

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results.xml
            coverage.xml